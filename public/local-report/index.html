<!doctype html>
<html lang="zh-CN">
  <head>
    <!--
      本页面的业务目的必须保持清晰：它是打包产物内置的中文报告页。
      禁止把数据展示入口改回 GitHub Pages、Vercel 或任何外网网页；脚本只能启动 localhost。
      页面筛选只能使用脚本生成的本地 report-data.json，不能依赖公网接口或远程资源。
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git 工作量报告</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <h1>Git 工作量报告</h1>
          <p id="reportMeta">正在加载本地报告数据...</p>
        </div>
      </header>

      <section class="panel filter-panel">
        <div class="filter-block">
          <label>项目筛选</label>
          <div class="filter-row">
            <select id="projectMode">
              <option value="all">全部项目</option>
              <option value="selected">多选项目</option>
              <option value="contains">项目名包含</option>
            </select>
            <input id="projectKeyword" type="search" placeholder="输入项目名关键词" />
          </div>
          <div class="choice-list" id="projectChoices"></div>
        </div>

        <div class="filter-block">
          <label>开发者筛选</label>
          <div class="filter-row">
            <select id="authorMode">
              <option value="all">全部开发者</option>
              <option value="selected">多选开发者</option>
              <option value="contains">姓名或邮箱包含</option>
            </select>
            <input id="authorKeyword" type="search" placeholder="输入姓名或邮箱关键词" />
          </div>
          <div class="choice-list" id="authorChoices"></div>
        </div>

        <div class="filter-block">
          <label>时间段筛选</label>
          <div class="date-range">
            <input id="startDate" type="date" />
            <input id="endDate" type="date" />
          </div>
        </div>
      </section>

      <section class="summary-grid">
        <article class="panel summary-card">
          <div class="label">提交次数</div>
          <div class="value" id="commitCount">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">新增代码行</div>
          <div class="value added" id="addedLines">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">删除代码行</div>
          <div class="value deleted" id="deletedLines">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">净变化行数</div>
          <div class="value" id="netLines">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">日均提交次数</div>
          <div class="value" id="dailyCommits">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">日均工作时长</div>
          <div class="value" id="dailyWorkHours">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">每周工作时长</div>
          <div class="value" id="weeklyWorkHours">0</div>
        </article>
        <article class="panel summary-card">
          <div class="label">加班时间占比</div>
          <div class="value" id="overtimeRatio">0%</div>
        </article>
      </section>

      <section class="content-grid">
        <article class="panel section">
          <h2>一周七天提交分布</h2>
          <div class="chart" id="weekChart"></div>
        </article>
        <article class="panel section">
          <h2>24 小时提交分布</h2>
          <div class="chart" id="hourChart"></div>
        </article>
        <article class="panel section">
          <h2>开发者时间占比</h2>
          <div class="chart" id="authorChart"></div>
        </article>
        <article class="panel section">
          <h2>开发者工作量</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>开发者</th>
                  <th>提交</th>
                  <th>新增</th>
                  <th>删除</th>
                  <th>工作天数</th>
                </tr>
              </thead>
              <tbody id="authorTable"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
